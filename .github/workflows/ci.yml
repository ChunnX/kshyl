name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    strategy:
      matrix:
        store: [memory, prisma]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json
      - run: npm ci
      - name: Prepare Prisma database
        if: matrix.store == 'prisma'
        env:
          DATABASE_URL: file:./ci.db
        run: |
          npm run prisma:migrate
          npm run db:seed
      - name: Run tests
        env:
          DATABASE_URL: ${{ matrix.store == 'prisma' && 'file:./ci.db' || '' }}
        run: npm test
